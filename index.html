<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forest Hunter</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#1f3d1f;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(#4caf50,#1b5e20);
}

.tree{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#2e7d32;
  z-index:1;
}

#player{
  position:absolute;
  width:45px;
  height:45px;
  background:cyan;
  border-radius:10px;
  left:50px;
  top:50px;
  z-index:10;
}

.enemy{
  position:absolute;
  width:45px;
  height:45px;
  background:red;
  border-radius:50%;
  z-index:9;
}

.wall{
  position:absolute;
  background:#5d4037;
}

#portal{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 20px yellow;
  z-index:8;
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:22px;
  z-index:100;
}

#tutorial{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
  background:rgba(0,0,0,0.5);
  padding:15px;
  border-radius:12px;
  font-size:20px;
  z-index:200;
}

#finalBoss{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:50%;
  background:purple;
  display:none;
  box-shadow:0 0 40px violet;
}

#downloadBtn{
  position:absolute;
  top:10px;
  right:10px;
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
  z-index:300;
}
</style>
</head>

<body>

<div id="game">

<div id="ui"></div>

<div id="tutorial">
W A S D = движение<br>
SPACE = удар мечом<br>
Доберись до портала!
</div>

<a href="index.html" download>
<button id="downloadBtn">DOWNLOAD GAME</button>
</a>

<div id="player"></div>
<div id="portal"></div>
<div id="finalBoss"></div>

</div>

<script>

const game = document.getElementById('game');
const player = document.getElementById('player');
const portal = document.getElementById('portal');
const ui = document.getElementById('ui');
const finalBoss = document.getElementById('finalBoss');

let x = 50;
let y = 50;
let speed = 6;
let level = 1;
let kills = 0;
let neededKills = 1;
let enemyHealth = 1;

let enemies = [];
let walls = [];

function random(min,max){
 return Math.floor(Math.random()*(max-min))+min;
}

function makeForest(){

 document.querySelectorAll('.tree').forEach(t=>t.remove());

 for(let i=0;i<20;i++){

  const tree = document.createElement('div');

  tree.className='tree';

  tree.style.left=random(0,1200)+'px';
  tree.style.top=random(0,700)+'px';

  game.appendChild(tree);
 }
}

function makeWalls(){

 document.querySelectorAll('.wall').forEach(w=>w.remove());

 walls=[];

 for(let i=0;i<level+2;i++){

  const wall=document.createElement('div');

  wall.className='wall';

  const wx=random(150,1100);
  const wy=random(50,650);
  const ww=random(120,300);

  wall.style.left=wx+'px';
  wall.style.top=wy+'px';
  wall.style.width=ww+'px';
  wall.style.height='20px';

  game.appendChild(wall);

  walls.push({
   x:wx,
   y:wy,
   w:ww,
   h:20
  });
 }
}

function makeEnemies(){

 document.querySelectorAll('.enemy').forEach(e=>e.remove());

 enemies=[];

 const amount = level + 1;

 for(let i=0;i<amount;i++){

  const enemy=document.createElement('div');

  enemy.className='enemy';

  const ex=random(300,1200);
  const ey=random(50,650);

  enemy.style.left=ex+'px';
  enemy.style.top=ey+'px';

  game.appendChild(enemy);

  enemies.push({
   el:enemy,
   x:ex,
   y:ey,
   hp:enemyHealth
  });
 }
}

function loadLevel(){

 x=50;
 y=50;

 kills=0;

 neededKills=level;
 enemyHealth=Math.min(level,6);

 player.style.left=x+'px';
 player.style.top=y+'px';

 portal.style.left='1150px';
 portal.style.top='620px';

 ui.innerHTML=
 'LEVEL: '+level+
 ' | KILLS: '+kills+'/'+neededKills;

 makeForest();
 makeWalls();
 makeEnemies();

 if(level===28){

  finalBoss.style.display='block';

  finalBoss.style.left='1000px';
  finalBoss.style.top='300px';
 }
}

loadLevel();

function touching(ax,ay,bx,by,bw,bh){

 return (
  ax < bx + bw &&
  ax + 45 > bx &&
  ay < by + bh &&
  ay + 45 > by
 );
}

function wallCollision(nx,ny){

 for(let wall of walls){

  if(
   nx < wall.x + wall.w &&
   nx + 45 > wall.x &&
   ny < wall.y + wall.h &&
   ny + 45 > wall.y
  ){
   return true;
  }
 }

 return false;
}

document.addEventListener('keydown',(e)=>{

 let nx=x;
 let ny=y;

 if(e.key==='w') ny-=speed;
 if(e.key==='s') ny+=speed;
 if(e.key==='a') nx-=speed;
 if(e.key==='d') nx+=speed;

 if(!wallCollision(nx,ny)){
  x=nx;
  y=ny;
 }

 player.style.left=x+'px';
 player.style.top=y+'px';

 if(e.key===' '){

  enemies.forEach((enemy,index)=>{

   const dx=Math.abs(enemy.x-x);
   const dy=Math.abs(enemy.y-y);

   if(dx<80 && dy<80){

    enemy.hp--;

    enemy.el.style.transform='scale(1.3)';

    setTimeout(()=>{
      enemy.el.style.transform='scale(1)';
    },100);

    if(enemy.hp<=0){

      enemy.el.remove();

      enemies.splice(index,1);

      kills++;

      ui.innerHTML=
      'LEVEL: '+level+
      ' | KILLS: '+kills+'/'+neededKills+
      ' | ENEMY HP: '+enemyHealth;
    }
   }
  });
 }

 if(
  touching(x,y,1150,620,60,60)
  && kills>=neededKills
 ){

  if(level<28){

   level++;

   loadLevel();

  }else{

   ui.innerHTML='YOU SAVED THE MAGIC FOREST!';
   tutorial.innerHTML='🏆 FINAL BOSS DEFEATED! 🏆';
  }
 }
});

function enemyAI(){

 enemies.forEach(enemy=>{

  if(enemy.x<x) enemy.x+=1+level*0.15;
  if(enemy.x>x) enemy.x-=1+level*0.15;

  if(enemy.y<y) enemy.y+=1+level*0.15;
  if(enemy.y>y) enemy.y-=1+level*0.15;

  enemy.el.style.left=enemy.x+'px';
  enemy.el.style.top=enemy.y+'px';

  if(touching(x,y,enemy.x,enemy.y,45,45)){

   ui.innerHTML='YOU DIED!';

   x=50;
   y=50;

   player.style.left=x+'px';
   player.style.top=y+'px';
  }

 });
}

setInterval(enemyAI,30);

</script>

</body>
</html>
