<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Forest Hunter</title>

<style>

html,body{
margin:0;
overflow:hidden;
height:100%;
font-family:Arial;
background:black;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;

outline:none;
}

/* TITLE */

#title{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);

font-size:42px;
font-weight:bold;

color:lime;

text-shadow:3px 3px black;

z-index:200;
}

/* UI */

#ui{
position:absolute;
top:90px;
left:15px;

font-size:22px;
color:white;

z-index:200;
}

/* TUTORIAL */

#tutorial{
position:absolute;
top:90px;
right:15px;

background:rgba(0,0,0,0.5);

padding:12px;

border-radius:15px;

color:white;

font-size:18px;

z-index:200;
}

/* PLAYER */

#player{
position:absolute;

width:55px;
height:55px;

background:cyan;

border-radius:15px;

left:60px;
top:300px;

box-shadow:0 0 20px cyan;

z-index:10;
}

/* ENEMIES */

.enemy{
position:absolute;

width:55px;
height:55px;

background:red;

border-radius:50%;

box-shadow:0 0 18px red;
}

/* PORTAL */

#portal{
position:absolute;

width:90px;
height:90px;

border-radius:50%;

background:gold;

top:300px;
right:25px;

box-shadow:0 0 35px yellow;
}

/* TREES */

.tree{
position:absolute;

width:65px;
height:65px;

background:green;

border-radius:50%;
}

/* WALLS */

.wall{
position:absolute;

background:#6d4c41;

border-radius:12px;
}

/* SAVE */

#save{
position:absolute;
bottom:15px;
left:15px;

font-size:18px;

background:rgba(0,0,0,0.6);

padding:10px;

border-radius:12px;

color:white;

z-index:300;
}

</style>
</head>

<body>

<div id="game" tabindex="0">

<div id="title">FOREST HUNTER</div>

<div id="ui">
LEVEL: 1<br>
KILLS: 0/1
</div>

<div id="tutorial">
💻 W A S D = MOVE<br>
⚔️ SPACE = ATTACK<br>
💾 AUTO SAVE
</div>

<div id="player"></div>

<div id="portal"></div>

<div id="save">
Game Saved ✔
</div>

</div>

<script>

const game=document.getElementById("game");
const player=document.getElementById("player");
const ui=document.getElementById("ui");

/* FOCUS */

game.focus();

window.onclick=()=>{
game.focus();
};

/* SAVE SYSTEM */

let savedLevel=localStorage.getItem("forestLevel");

let level=savedLevel ? parseInt(savedLevel) : 1;

let kills=0;

/* PLAYER */

let x=60;
let y=300;

/* ARRAYS */

let enemies=[];
let walls=[];

/* RANDOM */

function random(min,max){
return Math.floor(Math.random()*(max-min))+min;
}

/* TREES */

function makeTrees(){

document.querySelectorAll(".tree").forEach(t=>t.remove());

for(let i=0;i<12;i++){

let tree=document.createElement("div");

tree.className="tree";

tree.style.left=random(0,window.innerWidth-70)+"px";
tree.style.top=random(150,window.innerHeight-150)+"px";

game.appendChild(tree);
}
}

/* WALLS */

function makeWalls(){

document.querySelectorAll(".wall").forEach(w=>w.remove());

walls=[];

for(let i=0;i<level+1;i++){

let wall=document.createElement("div");

wall.className="wall";

let wx=random(100,window.innerWidth-250);
let wy=random(180,window.innerHeight-200);

wall.style.left=wx+"px";
wall.style.top=wy+"px";

wall.style.width=random(100,180)+"px";
wall.style.height="22px";

game.appendChild(wall);

walls.push({
x:wx,
y:wy,
w:parseInt(wall.style.width),
h:22
});
}
}

/* ENEMIES */

function makeEnemies(){

document.querySelectorAll(".enemy").forEach(e=>e.remove());

enemies=[];

for(let i=0;i<level+1;i++){

let enemy=document.createElement("div");

enemy.className="enemy";

let ex=random(150,window.innerWidth-120);
let ey=random(220,window.innerHeight-180);

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

game.appendChild(enemy);

enemies.push({
el:enemy,
x:ex,
y:ey,
hp:Math.min(level,5)
});
}
}

/* LEVEL */

function loadLevel(){

kills=0;

makeTrees();
makeWalls();
makeEnemies();

updateUI();
}

/* UI */

function updateUI(){

ui.innerHTML=
"LEVEL: "+level+
"<br>KILLS: "+kills+"/"+level;
}

/* PLAYER */

function updatePlayer(){

player.style.left=x+"px";
player.style.top=y+"px";
}

/* MOVE */

function move(dx,dy){

let nx=x+dx;
let ny=y+dy;

for(let wall of walls){

if(
nx<wall.x+wall.w &&
nx+55>wall.x &&
ny<wall.y+wall.h &&
ny+55>wall.y
){
return;
}
}

x=nx;
y=ny;

if(x<0)x=0;
if(y<150)y=150;

if(x>window.innerWidth-55)
x=window.innerWidth-55;

if(y>window.innerHeight-55)
y=window.innerHeight-55;

updatePlayer();

checkPortal();
}

/* ATTACK */

function attack(){

enemies.forEach((enemy,index)=>{

let dx=Math.abs(enemy.x-x);
let dy=Math.abs(enemy.y-y);

if(dx<90 && dy<90){

enemy.hp--;

enemy.el.style.background="orange";

setTimeout(()=>{
enemy.el.style.background="red";
},100);

if(enemy.hp<=0){

enemy.el.remove();

enemies.splice(index,1);

kills++;

updateUI();
}
}
});
}

/* NEXT LEVEL */

function checkPortal(){

if(
x>window.innerWidth-130 &&
Math.abs(y-300)<120 &&
kills>=level
){

if(level<28){

level++;

/* SAVE */

localStorage.setItem(
"forestLevel",
level
);

x=60;
y=300;

loadLevel();
updatePlayer();

}else{

ui.innerHTML="🏆 YOU WIN 🏆";
}
}
}

/* PC CONTROLS */

game.addEventListener("keydown",function(e){

e.preventDefault();

const key=e.key.toLowerCase();

if(key==="w"){
move(0,-25);
}

if(key==="s"){
move(0,25);
}

if(key==="a"){
move(-25,0);
}

if(key==="d"){
move(25,0);
}

if(e.code==="Space"){
attack();
}

});

/* ENEMY AI */

function enemyAI(){

enemies.forEach(enemy=>{

if(enemy.x<x)enemy.x+=1+level*0.2;
if(enemy.x>x)enemy.x-=1+level*0.2;

if(enemy.y<y)enemy.y+=1+level*0.2;
if(enemy.y>y)enemy.y-=1+level*0.2;

enemy.el.style.left=enemy.x+"px";
enemy.el.style.top=enemy.y+"px";

if(
Math.abs(enemy.x-x)<40 &&
Math.abs(enemy.y-y)<40
){

x=60;
y=300;

updatePlayer();
}
});
}

setInterval(enemyAI,30);

/* START */

loadLevel();
updatePlayer();

</script>

</body>
</html>
