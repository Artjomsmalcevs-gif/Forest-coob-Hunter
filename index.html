<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Forest Hunter Mobile</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#1f3d1f;
  touch-action:none;
}

#game{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(#4caf50,#1b5e20);
}

#player{
  position:absolute;
  width:45px;
  height:45px;
  background:cyan;
  border-radius:10px;
  left:50px;
  top:50px;
  z-index:10;
}

.enemy{
  position:absolute;
  width:45px;
  height:45px;
  background:red;
  border-radius:50%;
}

#portal{
  position:absolute;
  width:60px;
  height:60px;
  background:gold;
  border-radius:50%;
  left:85%;
  top:80%;
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:20px;
  z-index:100;
}

.btn{
  position:absolute;
  width:70px;
  height:70px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  color:white;
  font-size:30px;
}

#up{left:90px;bottom:170px;}
#left{left:10px;bottom:90px;}
#right{left:170px;bottom:90px;}
#down{left:90px;bottom:10px;}

#attack{
  right:30px;
  bottom:70px;
  width:90px;
  height:90px;
  background:orange;
}
</style>
</head>

<body>

<div id="game">

<div id="ui">
LEVEL: 1<br>
KILLS: 0
</div>

<div id="player"></div>
<div id="portal"></div>

<button class="btn" id="up">↑</button>
<button class="btn" id="left">←</button>
<button class="btn" id="right">→</button>
<button class="btn" id="down">↓</button>

<button class="btn" id="attack">⚔️</button>

</div>

<script>

const player=document.getElementById("player");
const portal=document.getElementById("portal");
const ui=document.getElementById("ui");

let x=50;
let y=50;

let level=1;
let kills=0;

let enemies=[];

function makeEnemies(){

 document.querySelectorAll(".enemy").forEach(e=>e.remove());

 enemies=[];

 for(let i=0;i<level+1;i++){

  let enemy=document.createElement("div");

  enemy.className="enemy";

  let ex=Math.random()*700+100;
  let ey=Math.random()*400+100;

  enemy.style.left=ex+"px";
  enemy.style.top=ey+"px";

  game.appendChild(enemy);

  enemies.push({
   el:enemy,
   x:ex,
   y:ey,
   hp:Math.min(level,4)
  });
 }
}

makeEnemies();

function update(){

 player.style.left=x+"px";
 player.style.top=y+"px";

 ui.innerHTML=
 "LEVEL: "+level+
 "<br>KILLS: "+kills+"/"+level;
}

update();

function move(dx,dy){

 x+=dx;
 y+=dy;

 if(x<0)x=0;
 if(y<0)y=0;

 if(x>window.innerWidth-45)
 x=window.innerWidth-45;

 if(y>window.innerHeight-45)
 y=window.innerHeight-45;

 update();
}

document.getElementById("up").ontouchstart=()=>move(0,-20);
document.getElementById("down").ontouchstart=()=>move(0,20);
document.getElementById("left").ontouchstart=()=>move(-20,0);
document.getElementById("right").ontouchstart=()=>move(20,0);

document.getElementById("attack").ontouchstart=()=>{

 enemies.forEach((enemy,index)=>{

  let dx=Math.abs(enemy.x-x);
  let dy=Math.abs(enemy.y-y);

  if(dx<80 && dy<80){

   enemy.hp--;

   enemy.el.style.background="orange";

   setTimeout(()=>{
    enemy.el.style.background="red";
   },100);

   if(enemy.hp<=0){

    enemy.el.remove();

    enemies.splice(index,1);

    kills++;

    update();
   }
  }
 });

 // следующий уровень
 if(
  x>window.innerWidth-150 &&
  y>window.innerHeight-150 &&
  kills>=level
 ){

  if(level<28){

   level++;
   kills=0;

   makeEnemies();

   x=50;
   y=50;

   update();

  }else{

   ui.innerHTML="🏆 YOU WIN 🏆";
  }
 }
};

function enemyAI(){

 enemies.forEach(enemy=>{

  if(enemy.x<x) enemy.x+=1+level*0.1;
  if(enemy.x>x) enemy.x-=1+level*0.1;

  if(enemy.y<y) enemy.y+=1+level*0.1;
  if(enemy.y>y) enemy.y-=1+level*0.1;

  enemy.el.style.left=enemy.x+"px";
  enemy.el.style.top=enemy.y+"px";

  if(
   Math.abs(enemy.x-x)<40 &&
   Math.abs(enemy.y-y)<40
  ){

   x=50;
   y=50;

   update();
  }
 });
}

setInterval(enemyAI,30);

</script>

</body>
</html></html>
