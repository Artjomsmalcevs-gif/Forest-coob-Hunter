<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Forest Hunter Mobile</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
touch-action:none;
background:black;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

#title{
position:absolute;
top:10px;
left:10px;
font-size:38px;
font-weight:bold;
color:lime;
text-shadow:3px 3px black;
z-index:100;
}

#ui{
position:absolute;
top:70px;
left:10px;
font-size:22px;
color:white;
z-index:100;
}

#tutorial{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:12px;
color:white;
font-size:16px;
z-index:100;
}

#player{
position:absolute;
width:50px;
height:50px;
background:cyan;
border-radius:12px;
left:60px;
top:120px;
z-index:10;
box-shadow:0 0 20px cyan;
}

.enemy{
position:absolute;
width:50px;
height:50px;
background:red;
border-radius:50%;
box-shadow:0 0 15px red;
}

#portal{
position:absolute;
width:80px;
height:80px;
border-radius:50%;
background:gold;
top:80px;
right:30px;
box-shadow:0 0 35px yellow;
}

.wall{
position:absolute;
background:#5d4037;
border-radius:10px;
}

.tree{
position:absolute;
width:60px;
height:60px;
background:green;
border-radius:50%;
}

#controls{
position:absolute;
bottom:20px;
left:0;
width:100%;
height:220px;
z-index:200;
}

.btn{
position:absolute;
width:75px;
height:75px;
border:none;
border-radius:50%;
background:rgba(255,255,255,0.25);
color:white;
font-size:34px;
backdrop-filter:blur(4px);
}

#up{
left:80px;
bottom:130px;
}

#left{
left:10px;
bottom:60px;
}

#right{
left:150px;
bottom:60px;
}

#down{
left:80px;
bottom:-10px;
}

#attack{
right:25px;
bottom:60px;
width:100px;
height:100px;
background:orange;
font-size:40px;
}

#download{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border:none;
border-radius:12px;
font-size:20px;
font-weight:bold;
background:gold;
z-index:300;
}

</style>
</head>

<body>

<div id="game">

<a href="index.html" download>
<button id="download">DOWNLOAD</button>
</a>

<div id="title">FOREST HUNTER</div>

<div id="ui">
LEVEL: 1<br>
KILLS: 0/1
</div>

<div id="tutorial">
📱 MOBILE MODE<br>
⚔️ ATTACK<br>
🌀 PORTAL
</div>

<div id="player"></div>

<div id="portal"></div>

<div id="controls">

<button class="btn" id="up">↑</button>
<button class="btn" id="left">←</button>
<button class="btn" id="right">→</button>
<button class="btn" id="down">↓</button>

<button class="btn" id="attack">⚔️</button>

</div>

</div>

<script>

const game=document.getElementById("game");
const player=document.getElementById("player");
const ui=document.getElementById("ui");

let x=60;
let y=120;

let level=1;
let kills=0;

let enemies=[];
let walls=[];

function random(min,max){
return Math.floor(Math.random()*(max-min))+min;
}

function makeTrees(){

document.querySelectorAll(".tree").forEach(t=>t.remove());

for(let i=0;i<12;i++){

let tree=document.createElement("div");

tree.className="tree";

tree.style.left=random(0,320)+"px";
tree.style.top=random(120,650)+"px";

game.appendChild(tree);
}
}

function makeWalls(){

document.querySelectorAll(".wall").forEach(w=>w.remove());

walls=[];

for(let i=0;i<level+1;i++){

let wall=document.createElement("div");

wall.className="wall";

let wx=random(50,260);
let wy=random(150,650);

wall.style.left=wx+"px";
wall.style.top=wy+"px";
wall.style.width=random(80,150)+"px";
wall.style.height="20px";

game.appendChild(wall);

walls.push({
x:wx,
y:wy,
w:parseInt(wall.style.width),
h:20
});
}
}

function makeEnemies(){

document.querySelectorAll(".enemy").forEach(e=>e.remove());

enemies=[];

for(let i=0;i<level+1;i++){

let enemy=document.createElement("div");

enemy.className="enemy";

let ex=random(120,320);
let ey=random(180,650);

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

game.appendChild(enemy);

enemies.push({
el:enemy,
x:ex,
y:ey,
hp:Math.min(level,5)
});
}
}

function loadLevel(){

kills=0;

makeTrees();
makeWalls();
makeEnemies();

updateUI();
}

function updateUI(){

ui.innerHTML=
"LEVEL: "+level+
"<br>KILLS: "+kills+"/"+level;
}

function updatePlayer(){

player.style.left=x+"px";
player.style.top=y+"px";
}

function move(dx,dy){

let nx=x+dx;
let ny=y+dy;

for(let wall of walls){

if(
nx<wall.x+wall.w &&
nx+50>wall.x &&
ny<wall.y+wall.h &&
ny+50>wall.y
){
return;
}
}

x=nx;
y=ny;

if(x<0)x=0;
if(y<100)y=100;

if(x>window.innerWidth-50)
x=window.innerWidth-50;

if(y>window.innerHeight-280)
y=window.innerHeight-280;

updatePlayer();

checkPortal();
}

function attack(){

enemies.forEach((enemy,index)=>{

let dx=Math.abs(enemy.x-x);
let dy=Math.abs(enemy.y-y);

if(dx<90 && dy<90){

enemy.hp--;

enemy.el.style.background="orange";

setTimeout(()=>{
enemy.el.style.background="red";
},100);

if(enemy.hp<=0){

enemy.el.remove();

enemies.splice(index,1);

kills++;

updateUI();
}
}
});
}

function checkPortal(){

if(
x>window.innerWidth-130 &&
y<180 &&
kills>=level
){

if(level<28){

level++;

x=60;
y=120;

loadLevel();
updatePlayer();

}else{

ui.innerHTML="🏆 YOU WIN 🏆";
}
}
}

document.getElementById("up").ontouchstart=()=>move(0,-25);
document.getElementById("down").ontouchstart=()=>move(0,25);
document.getElementById("left").ontouchstart=()=>move(-25,0);
document.getElementById("right").ontouchstart=()=>move(25,0);

document.getElementById("attack").ontouchstart=()=>attack();

function enemyAI(){

enemies.forEach(enemy=>{

if(enemy.x<x)enemy.x+=1+level*0.15;
if(enemy.x>x)enemy.x-=1+level*0.15;

if(enemy.y<y)enemy.y+=1+level*0.15;
if(enemy.y>y)enemy.y-=1+level*0.15;

enemy.el.style.left=enemy.x+"px";
enemy.el.style.top=enemy.y+"px";

if(
Math.abs(enemy.x-x)<40 &&
Math.abs(enemy.y-y)<40
){

x=60;
y=120;

updatePlayer();
}
});
}

setInterval(enemyAI,30);

loadLevel();
updatePlayer();

</script>

</body>
</html></html>
