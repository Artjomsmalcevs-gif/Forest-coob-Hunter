<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Cube Forest Online</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
width:100%;
height:100%;
background:black;
font-family:Arial;
touch-action:none;
}

#game{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

#title{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);

font-size:42px;
font-weight:bold;

color:lime;

text-shadow:3px 3px black;

z-index:200;
}

#nicknameBox{
position:absolute;
top:15px;
right:20px;

background:rgba(0,0,0,0.5);

padding:10px 16px;

border-radius:14px;

color:white;

font-size:20px;

z-index:500;
}

#ui{
position:absolute;
top:90px;
left:15px;

font-size:22px;
color:white;

z-index:500;
}

#player{
position:absolute;

width:55px;
height:55px;

background:cyan;

border-radius:15px;

left:60px;
top:300px;

box-shadow:0 0 20px cyan;

z-index:50;
}

.onlinePlayer{
position:absolute;

width:55px;
height:55px;

background:magenta;

border-radius:15px;

box-shadow:0 0 20px magenta;
}

.enemy{
position:absolute;

width:55px;
height:55px;

background:red;

border-radius:50%;

box-shadow:0 0 18px red;
}

.tree{
position:absolute;

width:65px;
height:65px;

background:green;

border-radius:50%;
}

.wall{
position:absolute;

background:#6d4c41;

border-radius:12px;
}

#portal{
position:absolute;

width:90px;
height:90px;

border-radius:50%;

background:gold;

top:300px;
right:25px;

box-shadow:0 0 35px yellow;
}

#pvpBtn,
#leaveBtn,
#joinBtn{

position:absolute;
right:20px;

padding:12px 18px;

border:none;
border-radius:14px;

font-size:18px;
font-weight:bold;

color:white;

z-index:999;
}

#pvpBtn{
top:70px;
background:red;
}

#leaveBtn{
top:130px;
background:#444;
}

#joinBtn{
top:190px;
background:green;
display:none;
}

#controls{
position:absolute;

bottom:20px;
left:0;

width:100%;
height:230px;

z-index:300;
}

.btn{
position:absolute;

width:80px;
height:80px;

border:none;

border-radius:50%;

background:rgba(255,255,255,0.25);

color:white;

font-size:36px;
}

#up{
left:90px;
bottom:140px;
}

#left{
left:10px;
bottom:60px;
}

#right{
left:170px;
bottom:60px;
}

#down{
left:90px;
bottom:-20px;
}

#attack{
right:25px;
bottom:60px;

width:105px;
height:105px;

background:orange;
font-size:42px;
}

#music{
position:fixed;
top:10px;
left:10px;
z-index:99999;
}

@media (min-width:900px){

#controls{
display:none;
}

}

</style>
</head>

<body>

<audio id="music" controls loop>

<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">

</audio>

<div id="game">

<div id="title">
CUBE FOREST ONLINE
</div>

<div id="nicknameBox"></div>

<div id="ui">
LEVEL: 1<br>
KILLS: 0/1
</div>

<button id="pvpBtn">
PVP
</button>

<button id="leaveBtn">
ВЫЙТИ ИЗ ONLINE
</button>

<button id="joinBtn">
ВОЙТИ В ONLINE
</button>

<div id="player"></div>

<div id="portal"></div>

<div id="controls">

<button class="btn" id="up">↑</button>
<button class="btn" id="left">←</button>
<button class="btn" id="right">→</button>
<button class="btn" id="down">↓</button>

<button class="btn" id="attack">⚔️</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyCWI27EmNBuWvZVKcp10hlM1Q6IdB_BU8c",
authDomain:"cube-forest-online.firebaseapp.com",
databaseURL:"https://cube-forest-online-default-rtdb.firebaseio.com",
projectId:"cube-forest-online",
storageBucket:"cube-forest-online.appspot.com",
messagingSenderId:"651385146904",
appId:"1:651385146904:web:f116175c0e341cc21ffd6d"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);

/* NICKNAME */

let nickname=localStorage.getItem("nickname");

if(!nickname){

nickname=prompt("ВВЕДИ NICKNAME");

localStorage.setItem("nickname",nickname);

}

document.getElementById("nicknameBox").innerHTML=
"👤 "+nickname;

/* GAME */

const game=document.getElementById("game");
const player=document.getElementById("player");
const ui=document.getElementById("ui");

let x=60;
let y=300;

let online=true;

let level=parseInt(localStorage.getItem("forestLevel")) || 1;

let kills=0;

let enemies=[];
let walls=[];

/* PVP */

let inPVP=false;
let currentRoom=null;
let hits=0;

/* SAVE */

function saveGame(){

localStorage.setItem("forestLevel",level);

}

/* RANDOM */

function random(min,max){

return Math.floor(Math.random()*(max-min))+min;

}

/* TREES */

function makeTrees(){

document.querySelectorAll(".tree").forEach(t=>t.remove());

for(let i=0;i<12;i++){

let tree=document.createElement("div");

tree.className="tree";

tree.style.left=random(0,window.innerWidth-70)+"px";
tree.style.top=random(150,window.innerHeight-200)+"px";

game.appendChild(tree);

}

}

/* WALLS */

function makeWalls(){

document.querySelectorAll(".wall").forEach(w=>w.remove());

walls=[];

for(let i=0;i<level+1;i++){

let wall=document.createElement("div");

wall.className="wall";

let wx=random(50,window.innerWidth-200);
let wy=random(180,window.innerHeight-250);

wall.style.left=wx+"px";
wall.style.top=wy+"px";

wall.style.width=random(80,180)+"px";
wall.style.height="22px";

game.appendChild(wall);

walls.push({

x:wx,
y:wy,
w:parseInt(wall.style.width),
h:22

});

}

}

/* ENEMIES */

function makeEnemies(){

document.querySelectorAll(".enemy").forEach(e=>e.remove());

enemies=[];

for(let i=0;i<level;i++){

let enemy=document.createElement("div");

enemy.className="enemy";

let ex=random(120,window.innerWidth-120);
let ey=random(220,window.innerHeight-250);

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

game.appendChild(enemy);

enemies.push({

el:enemy,
x:ex,
y:ey

});

}

}

/* LOAD LEVEL */

function loadLevel(){

kills=0;

makeTrees();
makeWalls();
makeEnemies();

updateUI();

}

/* UI */

function updateUI(){

if(inPVP){

ui.innerHTML=
"⚔️ PVP MODE<br>HITS: "+hits+"/10";

}else{

ui.innerHTML=
"LEVEL: "+level+
"<br>KILLS: "+kills+"/"+level;

}

}

/* PLAYER */

function updatePlayer(){

player.style.left=x+"px";
player.style.top=y+"px";

}

/* WALLS */

function hitWall(nx,ny){

for(let wall of walls){

if(

nx<wall.x+wall.w &&
nx+55>wall.x &&
ny<wall.y+wall.h &&
ny+55>wall.y

){

return true;

}

}

return false;

}

/* MOVE */

function move(dx,dy){

let nx=x+dx;
let ny=y+dy;

if(hitWall(nx,ny))return;

x=nx;
y=ny;

if(x<0)x=0;
if(y<0)y=0;

if(x>window.innerWidth-55)
x=window.innerWidth-55;

if(y>window.innerHeight-55)
y=window.innerHeight-55;

updatePlayer();

if(online){
syncPlayer();
}

checkPortal();

}

/* ATTACK */

function attack(){

if(inPVP){

document.querySelectorAll(".onlinePlayer").forEach(enemy=>{

let ex=parseInt(enemy.style.left);
let ey=parseInt(enemy.style.top);

let dx=Math.abs(ex-x);
let dy=Math.abs(ey-y);

if(dx<90 && dy<90){

hits++;

updateUI();

enemy.style.background="yellow";

setTimeout(()=>{
enemy.style.background="magenta";
},100);

if(hits>=10){

alert("🏆 ТЫ ПОБЕДИЛ!");

endPVP();

}

}

});

return;

}

/* NORMAL ENEMIES */

enemies.forEach((enemy,index)=>{

let dx=Math.abs(enemy.x-x);
let dy=Math.abs(enemy.y-y);

if(dx<90 && dy<90){

enemy.el.remove();

enemies.splice(index,1);

kills++;

updateUI();

}

});

}

/* NEXT LEVEL */

function checkPortal(){

if(inPVP)return;

if(

x>window.innerWidth-130 &&
Math.abs(y-300)<120 &&
kills>=level

){

if(level<28){

level++;

saveGame();

x=60;
y=300;

loadLevel();

updatePlayer();

}else{

ui.innerHTML="🏆 YOU WIN 🏆";

}

}

}

/* ENEMY AI */

function enemyAI(){

if(inPVP)return;

enemies.forEach(enemy=>{

if(enemy.x<x)enemy.x+=1;
if(enemy.x>x)enemy.x-=1;

if(enemy.y<y)enemy.y+=1;
if(enemy.y>y)enemy.y-=1;

enemy.el.style.left=enemy.x+"px";
enemy.el.style.top=enemy.y+"px";

if(

Math.abs(enemy.x-x)<40 &&
Math.abs(enemy.y-y)<40

){

x=60;
y=300;

updatePlayer();

}

});

}

setInterval(enemyAI,30);

/* ONLINE */

function syncPlayer(){

set(ref(db,"players/"+nickname),{

nickname:nickname,
x:x,
y:y

});

}

setInterval(()=>{

if(online){
syncPlayer();
}

},100);

/* PLAYERS */

onValue(ref(db,"players"),snapshot=>{

const data=snapshot.val();

document.querySelectorAll(".onlinePlayer").forEach(e=>e.remove());

if(!data)return;

Object.values(data).forEach(p=>{

if(p.nickname===nickname)return;

let enemy=document.createElement("div");

enemy.className="onlinePlayer";

enemy.style.left=p.x+"px";
enemy.style.top=p.y+"px";

game.appendChild(enemy);

});

});

/* SEND PVP */

document.getElementById("pvpBtn").onclick=function(){

let enemyNick=prompt("ВВЕДИ NICKNAME");

if(!enemyNick)return;

set(ref(db,"pvpRequests/"+enemyNick),{

from:nickname

});

alert("⚔️ ЗАПРОС ОТПРАВЛЕН");

};

/* RECEIVE */

onValue(ref(db,"pvpRequests/"+nickname),snapshot=>{

const data=snapshot.val();

if(!data)return;

let accept=confirm(
data.from+" ХОЧЕТ PVP"
);

if(accept){

currentRoom=
data.from+"_"+nickname;

set(ref(db,"pvpRooms/"+currentRoom),{

player1:data.from,
player2:nickname

});

}else{

alert("❌ PVP ОТКЛОНЁН");

}

remove(ref(db,"pvpRequests/"+nickname));

});

/* WATCH */

onValue(ref(db,"pvpRooms"),snapshot=>{

const rooms=snapshot.val();

if(!rooms)return;

Object.keys(rooms).forEach(roomId=>{

const room=rooms[roomId];

if(

room.player1===nickname ||
room.player2===nickname

){

if(!inPVP){

startPVP(roomId);

}

}

});

});

/* START PVP */

function startPVP(roomId){

inPVP=true;

currentRoom=roomId;

hits=0;

game.style.background=
"linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop')";

game.style.backgroundSize="cover";

if(roomId.startsWith(nickname)){

x=150;
y=300;

}else{

x=700;
y=300;

}

updatePlayer();

updateUI();

}

/* END PVP */

function endPVP(){

inPVP=false;

hits=0;

remove(ref(db,"pvpRooms/"+currentRoom));

game.style.background=
"linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop')";

game.style.backgroundSize="cover";

x=60;
y=300;

updatePlayer();

updateUI();

}

/* EXIT ONLINE */

document.getElementById("leaveBtn").onclick=function(){

online=false;

remove(ref(db,"players/"+nickname));

document.querySelectorAll(".onlinePlayer").forEach(e=>e.remove());

document.getElementById("leaveBtn").style.display="none";

document.getElementById("joinBtn").style.display="block";

};

/* JOIN ONLINE */

document.getElementById("joinBtn").onclick=function(){

online=true;

syncPlayer();

document.getElementById("leaveBtn").style.display="block";

document.getElementById("joinBtn").style.display="none";

};

/* MOBILE */

document.getElementById("up").ontouchstart=()=>move(0,-25);
document.getElementById("down").ontouchstart=()=>move(0,25);
document.getElementById("left").ontouchstart=()=>move(-25,0);
document.getElementById("right").ontouchstart=()=>move(25,0);

document.getElementById("attack").ontouchstart=()=>attack();

/* PC */

window.addEventListener("keydown",function(e){

const key=e.key.toLowerCase();

if(key==="w" || key==="arrowup") move(0,-25);
if(key==="s" || key==="arrowdown") move(0,25);
if(key==="a" || key==="arrowleft") move(-25,0);
if(key==="d" || key==="arrowright") move(25,0);

if(e.code==="Space"){
attack();
}

});

/* MUSIC */

const music=document.getElementById("music");

function startMusic(){

music.volume=0.5;

music.play();

document.removeEventListener("click",startMusic);
document.removeEventListener("touchstart",startMusic);

}

document.addEventListener("click",startMusic);
document.addEventListener("touchstart",startMusic);

/* START */

loadLevel();
updatePlayer();
syncPlayer();

</script>

</body>
</html>
