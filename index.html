<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Cube Forest Adventure Online</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
width:100%;
height:100%;
background:black;
font-family:Arial;
touch-action:none;
}

#game{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

#title{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);

font-size:42px;
font-weight:bold;

color:lime;

text-shadow:3px 3px black;

z-index:200;
}

#nicknameBox{
position:absolute;
top:15px;
right:20px;

background:rgba(0,0,0,0.5);

padding:10px 16px;

border-radius:14px;

color:white;

z-index:500;
}

#pvpBtn{
position:absolute;
top:70px;
right:20px;

padding:12px 20px;

background:red;
color:white;

border:none;
border-radius:15px;

font-size:20px;
font-weight:bold;

border:3px solid white;

box-shadow:0 0 15px red;

z-index:9999;
}

#ui{
position:absolute;
top:90px;
left:15px;

font-size:22px;
color:white;

z-index:200;
}

#player{
position:absolute;

width:55px;
height:55px;

background:cyan;

border-radius:15px;

box-shadow:0 0 20px cyan;

z-index:10;
}

.onlinePlayer{
position:absolute;

width:55px;
height:55px;

background:magenta;

border-radius:15px;

box-shadow:0 0 20px magenta;
}

.enemy{
position:absolute;

width:55px;
height:55px;

background:red;

border-radius:50%;

box-shadow:0 0 18px red;
}

#portal{
position:absolute;

width:90px;
height:90px;

border-radius:50%;

background:gold;

top:300px;
right:25px;

box-shadow:0 0 35px yellow;
}

#controls{
position:absolute;
bottom:20px;
left:0;

width:100%;
height:230px;

z-index:300;
}

.btn{
position:absolute;

width:80px;
height:80px;

border:none;

border-radius:50%;

background:rgba(255,255,255,0.25);

color:white;

font-size:36px;
}

#up{
left:90px;
bottom:140px;
}

#left{
left:10px;
bottom:60px;
}

#right{
left:170px;
bottom:60px;
}

#down{
left:90px;
bottom:-20px;
}

#attack{
right:25px;
bottom:60px;

width:105px;
height:105px;

background:orange;
font-size:42px;
}

#music{
position:fixed;
top:10px;
left:10px;
z-index:999999;
}

@media (min-width:900px){

#controls{
display:none;
}

}

</style>
</head>

<body>

<audio id="music" controls loop>

<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">

</audio>

<div id="game">

<div id="title">CUBE FOREST ADVENTURE ONLINE</div>

<div id="nicknameBox"></div>

<button id="pvpBtn">PVP</button>

<div id="ui">
LEVEL: 1<br>
KILLS: 0/1
</div>

<div id="player"></div>

<div id="portal"></div>

<div id="controls">

<button class="btn" id="up">↑</button>
<button class="btn" id="left">←</button>
<button class="btn" id="right">→</button>
<button class="btn" id="down">↓</button>

<button class="btn" id="attack">⚔️</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "ТВОЙ_API_KEY",
authDomain: "cube-forest-online.firebaseapp.com",
databaseURL: "https://cube-forest-online-default-rtdb.firebaseio.com",
projectId: "cube-forest-online",
storageBucket: "cube-forest-online.appspot.com",
messagingSenderId: "651385146904",
appId: "ТВОЙ_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* NICKNAME */

let nickname=localStorage.getItem("nickname");

if(!nickname){

nickname=prompt("ВВЕДИ NICKNAME");

localStorage.setItem("nickname",nickname);

}

document.getElementById("nicknameBox").innerHTML=
"👤 "+nickname;

/* SAVE */

let level=parseInt(localStorage.getItem("forestLevel")) || 1;

function saveGame(){

localStorage.setItem("forestLevel",level);

}

/* GAME */

const game=document.getElementById("game");
const player=document.getElementById("player");
const ui=document.getElementById("ui");

let x=60;
let y=300;

let kills=0;

let enemies=[];

/* UI */

function updateUI(){

ui.innerHTML=
"LEVEL: "+level+
"<br>KILLS: "+kills+"/"+level;

}

/* PLAYER */

function updatePlayer(){

player.style.left=x+"px";
player.style.top=y+"px";

}

/* RANDOM */

function random(min,max){
return Math.floor(Math.random()*(max-min))+min;
}

/* ENEMIES */

function makeEnemies(){

document.querySelectorAll(".enemy").forEach(e=>e.remove());

enemies=[];

for(let i=0;i<level;i++){

let enemy=document.createElement("div");

enemy.className="enemy";

let ex=random(120,window.innerWidth-120);
let ey=random(220,window.innerHeight-250);

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

game.appendChild(enemy);

enemies.push({
el:enemy,
x:ex,
y:ey
});

}

}

/* LOAD */

function loadLevel(){

kills=0;

makeEnemies();

updateUI();

}

/* MOVE */

function move(dx,dy){

x+=dx;
y+=dy;

if(x<0)x=0;
if(y<150)y=150;

if(x>window.innerWidth-55)
x=window.innerWidth-55;

if(y>window.innerHeight-100)
y=window.innerHeight-100;

updatePlayer();

syncPlayer();

checkPortal();

}

/* ATTACK */

function attack(){

enemies.forEach((enemy,index)=>{

let dx=Math.abs(enemy.x-x);
let dy=Math.abs(enemy.y-y);

if(dx<90 && dy<90){

enemy.el.remove();

enemies.splice(index,1);

kills++;

updateUI();

}

});

}

/* NEXT LEVEL */

function checkPortal(){

if(
x>window.innerWidth-130 &&
Math.abs(y-300)<120 &&
kills>=level
){

level++;

saveGame();

x=60;
y=300;

loadLevel();
updatePlayer();

}

}

/* ENEMY AI */

function enemyAI(){

enemies.forEach(enemy=>{

if(enemy.x<x)enemy.x+=1;
if(enemy.x>x)enemy.x-=1;

if(enemy.y<y)enemy.y+=1;
if(enemy.y>y)enemy.y-=1;

enemy.el.style.left=enemy.x+"px";
enemy.el.style.top=enemy.y+"px";

if(
Math.abs(enemy.x-x)<40 &&
Math.abs(enemy.y-y)<40
){

x=60;
y=300;

updatePlayer();

}

});

}

setInterval(enemyAI,30);

/* FIREBASE ONLINE */

function syncPlayer(){

set(ref(db,"players/"+nickname),{
x:x,
y:y,
nickname:nickname
});

}

onValue(ref(db,"players"),snapshot=>{

const data=snapshot.val();

document.querySelectorAll(".onlinePlayer").forEach(e=>e.remove());

if(!data)return;

Object.values(data).forEach(p=>{

if(p.nickname===nickname)return;

let enemy=document.createElement("div");

enemy.className="onlinePlayer";

enemy.style.left=p.x+"px";
enemy.style.top=p.y+"px";

game.appendChild(enemy);

});

});

/* PVP BUTTON */

document.getElementById("pvpBtn").onclick=function(){

let enemyNick=prompt("ВВЕДИ NICKNAME ИГРОКА");

if(!enemyNick)return;

alert("⚔️ ЗАПРОС НА PVP ОТПРАВЛЕН: "+enemyNick);

};

/* MOBILE */

document.getElementById("up").ontouchstart=()=>move(0,-25);
document.getElementById("down").ontouchstart=()=>move(0,25);
document.getElementById("left").ontouchstart=()=>move(-25,0);
document.getElementById("right").ontouchstart=()=>move(25,0);

document.getElementById("attack").ontouchstart=()=>attack();

/* PC */

window.addEventListener("keydown",function(e){

const key=e.key.toLowerCase();

if(key==="w" || key==="arrowup") move(0,-25);
if(key==="s" || key==="arrowdown") move(0,25);
if(key==="a" || key==="arrowleft") move(-25,0);
if(key==="d" || key==="arrowright") move(25,0);

if(e.code==="Space") attack();

});

/* MUSIC */

const music=document.getElementById("music");

function startMusic(){

music.volume=0.5;

music.play();

document.removeEventListener("click",startMusic);
document.removeEventListener("touchstart",startMusic);

}

document.addEventListener("click",startMusic);
document.addEventListener("touchstart",startMusic);

/* START */

loadLevel();
updatePlayer();
syncPlayer();

</script>

</body>
</html>
