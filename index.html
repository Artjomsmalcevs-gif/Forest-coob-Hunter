<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<meta name="screen-orientation" content="landscape">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Forest Hunter</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" href="icon.png">

<link rel="apple-touch-icon" href="icon.png">

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;

width:100%;
height:100%;

background:black;

font-family:Arial;

touch-action:none;

overscroll-behavior:none;
}

/* FULLSCREEN GAME */

#game{
position:fixed;

top:0;
left:0;

width:100vw;
height:100dvh;

overflow:hidden;

background:
linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

/* ROTATE PHONE */

@media screen and (orientation:portrait){

body::before{
content:"🔄 TURN PHONE HORIZONTAL";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;
color:white;

display:flex;
justify-content:center;
align-items:center;

font-size:34px;
text-align:center;

z-index:999999;
}

#game{
display:none;
}

}

button{
outline:none;
}

/* DOWNLOAD */

#download{
position:fixed;

top:15px;
right:15px;

z-index:99999;

padding:14px 20px;

background:gold;
color:black;

font-size:20px;
font-weight:bold;

border:none;
border-radius:15px;

box-shadow:0 0 15px black;
}

/* TITLE */

#title{
position:absolute;

top:20px;
left:50%;

transform:translateX(-50%);

font-size:42px;
font-weight:bold;

color:lime;

text-shadow:3px 3px black;

z-index:200;
}

/* UI */

#ui{
position:absolute;

top:90px;
left:15px;

font-size:22px;

color:white;

z-index:200;
}

/* TUTORIAL */

#tutorial{
position:absolute;

top:90px;
right:15px;

background:rgba(0,0,0,0.5);

padding:12px;

border-radius:15px;

color:white;

font-size:17px;

z-index:200;
}

/* PLAYER */

#player{
position:absolute;

width:55px;
height:55px;

background:cyan;

border-radius:15px;

left:60px;
top:300px;

box-shadow:0 0 20px cyan;

z-index:10;
}

/* ENEMIES */

.enemy{
position:absolute;

width:55px;
height:55px;

background:red;

border-radius:50%;

box-shadow:0 0 18px red;
}

/* PORTAL */

#portal{
position:absolute;

width:90px;
height:90px;

border-radius:50%;

background:gold;

top:300px;
right:25px;

box-shadow:0 0 35px yellow;
}

/* WALLS */

.wall{
position:absolute;

background:#6d4c41;

border-radius:12px;
}

/* TREES */

.tree{
position:absolute;

width:65px;
height:65px;

background:green;

border-radius:50%;
}

/* MOBILE CONTROLS */

#controls{
position:absolute;

bottom:20px;
left:0;

width:100%;
height:230px;

z-index:300;
}

.btn{
position:absolute;

width:80px;
height:80px;

border:none;

border-radius:50%;

background:rgba(255,255,255,0.25);

color:white;

font-size:36px;

backdrop-filter:blur(5px);
}

#up{
left:90px;
bottom:140px;
}

#left{
left:10px;
bottom:60px;
}

#right{
left:170px;
bottom:60px;
}

#down{
left:90px;
bottom:-20px;
}

#attack{
right:25px;
bottom:60px;

width:105px;
height:105px;

background:orange;

font-size:42px;
}

/* PC */

@media (min-width:900px){

#controls{
display:none;
}

}

</style>
</head>

<body>

<div id="game">

<a href="index.html" download>
<button id="download">DOWNLOAD</button>
</a>

<div id="title">FOREST HUNTER</div>

<div id="ui">
LEVEL: 1<br>
KILLS: 0/1
</div>

<div id="tutorial">
💻 W A S D / ARROWS<br>
⚔️ SPACE = ATTACK<br>
📱 TOUCH BUTTONS
</div>

<div id="player"></div>

<div id="portal"></div>

<div id="controls">

<button class="btn" id="up">↑</button>
<button class="btn" id="left">←</button>
<button class="btn" id="right">→</button>
<button class="btn" id="down">↓</button>

<button class="btn" id="attack">⚔️</button>

</div>

</div>

<script>

const game=document.getElementById("game");
const player=document.getElementById("player");
const ui=document.getElementById("ui");

let x=60;
let y=300;

let level=1;
let kills=0;
  
/* SAVE SYSTEM */

const savedLevel = localStorage.getItem("forestLevel");

if(savedLevel){
level=parseInt(savedLevel);
}

function saveGame(){

localStorage.setItem("forestLevel",level);

}
let enemies=[];
let walls=[];

function random(min,max){
return Math.floor(Math.random()*(max-min))+min;
}

function makeTrees(){

document.querySelectorAll(".tree").forEach(t=>t.remove());

for(let i=0;i<12;i++){

let tree=document.createElement("div");

tree.className="tree";

tree.style.left=random(0,window.innerWidth-70)+"px";
tree.style.top=random(150,window.innerHeight-200)+"px";

game.appendChild(tree);
}
}

function makeWalls(){

document.querySelectorAll(".wall").forEach(w=>w.remove());

walls=[];

for(let i=0;i<level+1;i++){

let wall=document.createElement("div");

wall.className="wall";

let wx=random(50,window.innerWidth-200);
let wy=random(180,window.innerHeight-250);

wall.style.left=wx+"px";
wall.style.top=wy+"px";
wall.style.width=random(80,180)+"px";
wall.style.height="22px";

game.appendChild(wall);

walls.push({
x:wx,
y:wy,
w:parseInt(wall.style.width),
h:22
});
}
}

function makeEnemies(){

document.querySelectorAll(".enemy").forEach(e=>e.remove());

enemies=[];

for(let i=0;i<level+1;i++){

let enemy=document.createElement("div");

enemy.className="enemy";

let ex=random(120,window.innerWidth-120);
let ey=random(220,window.innerHeight-250);

enemy.style.left=ex+"px";
enemy.style.top=ey+"px";

game.appendChild(enemy);

enemies.push({
el:enemy,
x:ex,
y:ey,
hp:Math.min(level,5)
});
}
}

function loadLevel(){

kills=0;

makeTrees();
makeWalls();
makeEnemies();

updateUI();
}

function updateUI(){

ui.innerHTML=
"LEVEL: "+level+
"<br>KILLS: "+kills+"/"+level;
}

function updatePlayer(){

player.style.left=x+"px";
player.style.top=y+"px";
}

function move(dx,dy){

let nx=x+dx;
let ny=y+dy;

for(let wall of walls){

if(
nx<wall.x+wall.w &&
nx+55>wall.x &&
ny<wall.y+wall.h &&
ny+55>wall.y
){
return;
}
}

x=nx;
y=ny;

if(x<0)x=0;
if(y<150)y=150;

if(x>window.innerWidth-55)
x=window.innerWidth-55;

if(y>window.innerHeight-100)
y=window.innerHeight-100;

updatePlayer();

checkPortal();
}

function attack(){

enemies.forEach((enemy,index)=>{

let dx=Math.abs(enemy.x-x);
let dy=Math.abs(enemy.y-y);

if(dx<90 && dy<90){

enemy.hp--;

enemy.el.style.background="orange";

setTimeout(()=>{
enemy.el.style.background="red";
},100);

if(enemy.hp<=0){

enemy.el.remove();

enemies.splice(index,1);

kills++;

updateUI();
}
}
});
}

function checkPortal(){

if(
x>window.innerWidth-130 &&
Math.abs(y-300)<120 &&
kills>=level
){

if(level<28){

level++;

saveGame();

x=60;
y=300;

loadLevel();
updatePlayer();

}else{

ui.innerHTML="🏆 YOU WIN 🏆";
}
}
}

document.getElementById("up").ontouchstart=()=>move(0,-25);
document.getElementById("down").ontouchstart=()=>move(0,25);
document.getElementById("left").ontouchstart=()=>move(-25,0);
document.getElementById("right").ontouchstart=()=>move(25,0);

document.getElementById("attack").ontouchstart=()=>attack();

window.addEventListener("keydown",function(e){

e.preventDefault();

const key=e.key.toLowerCase();

if(key==="w" || key==="arrowup") move(0,-25);
if(key==="s" || key==="arrowdown") move(0,25);
if(key==="a" || key==="arrowleft") move(-25,0);
if(key==="d" || key==="arrowright") move(25,0);

if(e.code==="Space") attack();

});

function enemyAI(){

enemies.forEach(enemy=>{

if(enemy.x<x)enemy.x+=1+level*0.15;
if(enemy.x>x)enemy.x-=1+level*0.15;

if(enemy.y<y)enemy.y+=1+level*0.15;
if(enemy.y>y)enemy.y-=1+level*0.15;

enemy.el.style.left=enemy.x+"px";
enemy.el.style.top=enemy.y+"px";

if(
Math.abs(enemy.x-x)<40 &&
Math.abs(enemy.y-y)<40
){

x=60;
y=300;

updatePlayer();
}
});
}

setInterval(enemyAI,30);

loadLevel();
updatePlayer();

</script>

</body>
</html>
