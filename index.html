<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Cube Forest Adventure Online</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
width:100%;
height:100%;
background:black;
font-family:Arial;
touch-action:none;
}

#game{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
overflow:hidden;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;
}

#title{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);

font-size:42px;
font-weight:bold;

color:lime;

text-shadow:3px 3px black;

z-index:200;
}

#ui{
position:absolute;
top:90px;
left:15px;

font-size:22px;
color:white;

z-index:200;
}

#nicknameBox{
position:absolute;
top:15px;
right:20px;

background:rgba(0,0,0,0.5);

padding:10px 16px;

border-radius:14px;

color:white;

z-index:500;
}

#pvpBtn,
#leaveOnlineBtn,
#joinOnlineBtn{

position:absolute;

right:20px;

padding:12px 20px;

border:none;
border-radius:15px;

font-size:18px;
font-weight:bold;

color:white;

z-index:9999;

}

#pvpBtn{
top:70px;
background:red;
}

#leaveOnlineBtn{
top:130px;
background:#444;
}

#joinOnlineBtn{
top:190px;
background:green;
display:none;
}

#player{
position:absolute;

width:55px;
height:55px;

background:cyan;

border-radius:15px;

box-shadow:0 0 20px cyan;

z-index:10;
}

.onlinePlayer{
position:absolute;

width:55px;
height:55px;

background:magenta;

border-radius:15px;

box-shadow:0 0 20px magenta;
}

#controls{
position:absolute;
bottom:20px;
left:0;

width:100%;
height:230px;

z-index:300;
}

.btn{
position:absolute;

width:80px;
height:80px;

border:none;

border-radius:50%;

background:rgba(255,255,255,0.25);

color:white;

font-size:36px;
}

#up{
left:90px;
bottom:140px;
}

#left{
left:10px;
bottom:60px;
}

#right{
left:170px;
bottom:60px;
}

#down{
left:90px;
bottom:-20px;
}

#attack{
right:25px;
bottom:60px;

width:105px;
height:105px;

background:orange;
font-size:42px;
}

#music{
position:fixed;
top:10px;
left:10px;
z-index:999999;
}

@media screen and (orientation:portrait){

body::before{
content:"🔄 ПОВЕРНИ ТЕЛЕФОН";

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:black;
color:white;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;
text-align:center;

z-index:999999;
}

#game{
display:none;
}

}

@media (min-width:900px){

#controls{
display:none;
}

}

</style>
</head>

<body>

<audio id="music" controls loop>

<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">

</audio>

<div id="game">

<div id="title">
CUBE FOREST ADVENTURE ONLINE
</div>

<div id="nicknameBox"></div>

<button id="pvpBtn">PVP</button>

<button id="leaveOnlineBtn">
ВЫЙТИ ИЗ ONLINE
</button>

<button id="joinOnlineBtn">
ВОЙТИ В ONLINE
</button>

<div id="ui">
🌍 ONLINE MODE
</div>

<div id="player"></div>

<div id="controls">

<button class="btn" id="up">↑</button>
<button class="btn" id="left">←</button>
<button class="btn" id="right">→</button>
<button class="btn" id="down">↓</button>

<button class="btn" id="attack">⚔️</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCWI27EmNBuWvZVKcp10hlM1Q6IdB_BU8c",
authDomain: "cube-forest-online.firebaseapp.com",
databaseURL: "https://cube-forest-online-default-rtdb.firebaseio.com",
projectId: "cube-forest-online",
storageBucket: "cube-forest-online.appspot.com",
messagingSenderId: "651385146904",
appId: "1:651385146904:web:f116175c0e341cc21ffd6d"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* NICKNAME */

let nickname=localStorage.getItem("nickname");

if(!nickname){

nickname=prompt("ВВЕДИ NICKNAME");

localStorage.setItem("nickname",nickname);

}

document.getElementById("nicknameBox").innerHTML=
"👤 "+nickname;

/* PLAYER */

const player=document.getElementById("player");

let x=60;
let y=300;

function updatePlayer(){

player.style.left=x+"px";
player.style.top=y+"px";

}

/* MOVE */

function move(dx,dy){

x+=dx;
y+=dy;

if(x<0)x=0;
if(y<0)y=0;

if(x>window.innerWidth-55)
x=window.innerWidth-55;

if(y>window.innerHeight-55)
y=window.innerHeight-55;

updatePlayer();

syncPlayer();

}

/* MOBILE */

document.getElementById("up").ontouchstart=()=>move(0,-25);
document.getElementById("down").ontouchstart=()=>move(0,25);
document.getElementById("left").ontouchstart=()=>move(-25,0);
document.getElementById("right").ontouchstart=()=>move(25,0);

document.getElementById("attack").ontouchstart=()=>attack();

/* PC */

window.addEventListener("keydown",function(e){

const key=e.key.toLowerCase();

if(key==="w" || key==="arrowup") move(0,-25);
if(key==="s" || key==="arrowdown") move(0,25);
if(key==="a" || key==="arrowleft") move(-25,0);
if(key==="d" || key==="arrowright") move(25,0);

if(e.code==="Space") attack();

});

/* ONLINE */

function syncPlayer(){

set(ref(db,"players/"+nickname),{
x:x,
y:y,
nickname:nickname
});

}

setInterval(syncPlayer,100);

/* OTHER PLAYERS */

onValue(ref(db,"players"),snapshot=>{

const data=snapshot.val();

document.querySelectorAll(".onlinePlayer").forEach(e=>e.remove());

if(!data)return;

Object.values(data).forEach(p=>{

if(p.nickname===nickname)return;

let enemy=document.createElement("div");

enemy.className="onlinePlayer";

enemy.style.left=p.x+"px";
enemy.style.top=p.y+"px";

document.getElementById("game").appendChild(enemy);

});

});

/* PVP */

let inPVP=false;
let pvpHits=0;

/* SEND REQUEST */

document.getElementById("pvpBtn").onclick=function(){

let enemyNick=prompt("ВВЕДИ NICKNAME ИГРОКА");

if(!enemyNick)return;

set(ref(db,"pvpRequests/"+enemyNick),{
from:nickname
});

alert("⚔️ ЗАПРОС ОТПРАВЛЕН");

};

/* RECEIVE REQUEST */

onValue(ref(db,"pvpRequests/"+nickname),snapshot=>{

const data=snapshot.val();

if(!data)return;

let accept=confirm(
"⚔️ "+data.from+" ХОЧЕТ PVP"
);

if(accept){

set(ref(db,"pvpRooms/"+data.from+"_"+nickname),{
player1:data.from,
player2:nickname
});

alert("✅ PVP ПРИНЯТ");

}else{

alert("❌ PVP ОТКЛОНЁН");

}

remove(ref(db,"pvpRequests/"+nickname));

});

/* START PVP */

function startPVP(){

if(inPVP)return;

inPVP=true;

pvpHits=0;

document.getElementById("game").style.background=
"linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop')";

document.getElementById("game").style.backgroundSize="cover";

x=100;
y=300;

updatePlayer();

document.getElementById("ui").innerHTML=
"⚔️ PVP MODE<br>HITS: 0/10";

alert("⚔️ PVP НАЧАЛСЯ");

}

/* ROOM CHECK */

onValue(ref(db,"pvpRooms"),snapshot=>{

const rooms=snapshot.val();

if(!rooms)return;

Object.values(rooms).forEach(room=>{

if(
room.player1===nickname ||
room.player2===nickname
){

startPVP();

}

});

});

/* ATTACK */

function attack(){

if(!inPVP)return;

document.querySelectorAll(".onlinePlayer").forEach(enemy=>{

let ex=parseInt(enemy.style.left);
let ey=parseInt(enemy.style.top);

let dx=Math.abs(ex-x);
let dy=Math.abs(ey-y);

if(dx<90 && dy<90){

pvpHits++;

enemy.style.background="yellow";

setTimeout(()=>{
enemy.style.background="magenta";
},100);

document.getElementById("ui").innerHTML=
"⚔️ PVP MODE<br>HITS: "+pvpHits+"/10";

if(pvpHits>=10){

alert("🏆 ТЫ ВЫИГРАЛ!");

exitPVP();

}

}

});

}

/* EXIT PVP */

function exitPVP(){

inPVP=false;

pvpHits=0;

document.getElementById("game").style.background=
"linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop')";

document.getElementById("game").style.backgroundSize="cover";

document.getElementById("ui").innerHTML=
"🌍 ONLINE MODE";

}

/* LEAVE ONLINE */

document.getElementById("leaveOnlineBtn").onclick=function(){

remove(ref(db,"players/"+nickname));

alert("❌ ТЫ ВЫШЕЛ ИЗ ONLINE");

document.getElementById("leaveOnlineBtn").style.display="none";

document.getElementById("joinOnlineBtn").style.display="block";

};

/* JOIN ONLINE */

document.getElementById("joinOnlineBtn").onclick=function(){

syncPlayer();

alert("✅ ТЫ СНОВА В ONLINE");

document.getElementById("joinOnlineBtn").style.display="none";

document.getElementById("leaveOnlineBtn").style.display="block";

};

/* MUSIC */

const music=document.getElementById("music");

function startMusic(){

music.volume=0.5;

music.play();

document.removeEventListener("click",startMusic);
document.removeEventListener("touchstart",startMusic);

}

document.addEventListener("click",startMusic);
document.addEventListener("touchstart",startMusic);

/* START */

updatePlayer();
syncPlayer();

</script>

</body>
</html>
